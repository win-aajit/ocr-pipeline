apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-processor-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doc-processor
  template:
    metadata:
      labels:
        app: doc-processor
    spec:
      containers:
      - name: doc-processor
        image: doc-processor:latest
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/uploads
      volumes:
      - name: uploads-volume
        emptyDir: {}